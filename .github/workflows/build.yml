name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run all tests with Maven
        run: mvn -B clean test --file pom.xml

      - name: Upload compiled WAR artefact
        uses: actions/upload-artifact@v4
        with:
          name: ResortManagement-WAR
          path: target/*.war
